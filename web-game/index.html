<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var force = params.get("mobile");
      if (force === "1" || force === "true") {
        document.documentElement.classList.add("mobile-layout");
        return;
      }
      if (force === "0" || force === "false") return;
      var w = (window.visualViewport && window.visualViewport.width) || document.documentElement.clientWidth || window.innerWidth;
      if (w <= 768 || window.matchMedia("(hover: none) and (pointer: coarse)").matches) {
        document.documentElement.classList.add("mobile-layout");
      }
    })();
  </script>
  <title>Koodisampo</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: ui-monospace, Menlo, monospace;
      background: #0d1117;
      color: #c9d1d9;
      margin: 0;
      padding: 16px;
      font-size: 14px;
    }
    #app { min-height: 100%; }
    h1 { font-size: 1rem; color: #58a6ff; margin: 0 0 8px; }
    #top-bar { margin-bottom: 8px; }
    #hud-stats { display: none; gap: 10px; flex-wrap: wrap; color: #8b949e; font-size: 12px; }
    #hud-stats .karma { color: #3fb950; font-weight: bold; }
    #hud-stats .hud-warn { color: #f85149; font-weight: bold; }
    #hud-stats .hud-floor { color: #39c5cf; }
    #message-bar {
      display: none;
      color: #f0883e;
      font-size: 13px;
      line-height: 1.35;
      margin-bottom: 8px;
      min-height: 1.2em;
    }
    .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
    #game-area { display: flex; gap: 16px; flex: 1; min-height: 0; }
    #main { flex: 1; min-width: 420px; max-width: 720px; }
    #map-wrap { min-height: 0; }
    #map {
      background: #161b22;
      padding: 12px;
      border: 1px solid #30363d;
      border-radius: 6px;
      line-height: 1.25;
      white-space: pre-wrap;
    }
    #map .map-grid { white-space: pre; line-height: 1.1; letter-spacing: 0; margin: 0; }
    #map .map-emoji {
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", emoji, sans-serif;
      display: inline-block;
      width: 1.25em;
      text-align: center;
      vertical-align: -0.08em;
    }
    #map .map-eaten {
      display: inline-block;
      width: 0;
      overflow: hidden;
      vertical-align: bottom;
    }
    #map .police { background: #000; color: #fff; font-weight: bold; }
    #map .npc-recommended { background: #1a3d2e; color: #7ee787; font-weight: bold; border-radius: 2px; }
    #panel { flex: 1; min-width: 280px; }
    pre { background: #161b22; padding: 12px; border-radius: 6px; overflow: auto; max-height: 40vh; font-size: 11px; }
    .status { color: #f0883e; margin: 8px 0; }
    .warn { color: #f85149; font-weight: bold; }
    button {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 6px 10px;
      margin: 2px;
      cursor: pointer;
      border-radius: 4px;
      font-family: inherit;
      font-size: 13px;
      touch-action: manipulation;
    }
    button:hover { background: #30363d; }
    button.danger { color: #f85149; border-color: #f8514966; }
    button.muted { color: #8b949e; }
    button.ai { color: #d2a8ff; }
    .hint { color: #8b949e; font-size: 12px; margin-top: 8px; line-height: 1.5; }
    .banner { color: #39c5cf; font-weight: bold; margin-bottom: 12px; white-space: pre; font-size: 12px; }
    .stats { color: #8b949e; margin-bottom: 12px; }
    .stats .karma { color: #3fb950; font-weight: bold; }
    .entity { margin-bottom: 12px; }
    .entity-char { color: #d2a8ff; font-weight: bold; }
    .entity-name { color: #e3b341; font-weight: bold; }
    .greeting { margin: 12px 0; line-height: 1.5; }
    .choice { margin: 6px 0; }
    .choice-num { color: #e3b341; }
    .divider { color: #8b949e; margin: 14px 0 8px; }
    .side-opt { margin: 4px 0; }
    .side-key { font-weight: bold; }
    .side-key.ai { color: #d2a8ff; }
    .side-key.joke { color: #39c5cf; }
    .side-key.meh, .side-key.leave { color: #8b949e; }
    .side-key.attack { color: #f85149; font-weight: bold; }
    .attack-warn { color: #f85149; }
    .overlay-title { font-weight: bold; margin-bottom: 8px; }
    .overlay-title.ok { color: #3fb950; }
    .overlay-title.bad { color: #f85149; }
    .overlay-title.ai { color: #d2a8ff; }
    .teaching { color: #8b949e; margin-top: 12px; line-height: 1.5; }
    .teaching h4 { color: #8b949e; margin: 0 0 6px; font-size: 12px; }
    .banter-line { margin: 8px 0; }
    .banter-you { color: #e3b341; }
    .banter-npc { color: #d2a8ff; }
    .toolbar { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 2px; }
    .toolbar-label { width: 100%; color: #8b949e; font-size: 11px; margin-top: 4px; }

    .profile-setup {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: rgba(13, 17, 23, 0.92);
    }
    .profile-setup[hidden] { display: none !important; }
    .profile-setup-card {
      width: 100%;
      max-width: 400px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .profile-setup-card h2 {
      margin: 0;
      color: #58a6ff;
      font-size: 1.1rem;
    }
    .profile-setup-lead, .profile-setup-hint {
      margin: 0;
      color: #8b949e;
      font-size: 13px;
      line-height: 1.45;
    }
    .profile-setup-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      color: #c9d1d9;
      font-size: 13px;
    }
    .profile-setup-field input,
    .profile-setup-field select {
      font: inherit;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: #c9d1d9;
    }
    .profile-setup-submit {
      margin-top: 4px;
      padding: 10px 14px;
      background: #238636;
      border-color: #2ea043;
      color: #fff;
      font-weight: bold;
      width: 100%;
    }
    .profile-setup-error {
      margin: 0;
      color: #f85149;
      font-size: 13px;
      line-height: 1.4;
    }

    /* ── Mobile: pelkistetty pelinäkymä ── */
    @media (max-width: 768px) {
      body { padding: 0; overflow: hidden; }
      #app {
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr) minmax(150px, 26dvh);
        height: 100dvh;
        max-height: 100dvh;
      }
      html.mobile-layout.mobile-text-choices #app,
      html.mobile-layout.mobile-toolbar-hidden #app {
        grid-template-rows: auto auto minmax(0, 1fr);
      }
      h1 { font-size: 0.7rem; margin: 0; padding: 6px 10px 0; }
      #top-bar { padding: 0; margin: 0; border-bottom: 1px solid #30363d; }
      #hud-stats { display: flex; padding: 4px 10px 6px; }
      #message-bar { display: block; padding: 4px 10px; border-bottom: 1px solid #30363d; margin: 0; font-size: 12px; }
      .row { display: contents; }
      #game-area { overflow: hidden; min-height: 0; }
      #main {
        min-width: 0;
        max-width: none;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding: 0;
        min-height: 0;
      }
      #map-wrap {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        overflow: hidden;
        padding: 0;
        min-height: 0;
      }
      #map-wrap.map-play-view {
        justify-content: flex-start;
        overflow: hidden;
      }
      #map-wrap.map-play-view #map {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        width: 100%;
        overflow: hidden;
      }
      #map-wrap.map-play-view [data-map-shell] {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        width: 100%;
        max-height: 100%;
        overflow: hidden;
        flex-shrink: 0;
      }
      #map-wrap.map-play-view [data-map-grid] {
        box-sizing: border-box;
        width: 100%;
        max-width: 100%;
        margin: 0;
        padding: 0;
        border: none;
        text-align: center;
        line-height: 1.05;
        flex-shrink: 0;
        overflow: hidden;
        font-family: ui-monospace, Menlo, "Roboto Mono", "Droid Sans Mono", monospace;
        font-size: var(--map-cell-px, calc(100vw / var(--map-cols, 19)));
        letter-spacing: 0;
        font-variant-ligatures: none;
      }
      #map-wrap.map-play-view [data-map-grid] .map-rows,
      #map-wrap.map-play-view [data-map-grid] [data-map-rows] {
        display: inline-block;
        text-align: left;
        vertical-align: top;
        max-width: 100%;
      }
      #map-wrap.map-play-view [data-map-grid] [data-map-row] {
        display: block;
        white-space: pre;
        font-family: inherit;
        font-size: inherit;
        line-height: inherit;
        letter-spacing: inherit;
      }
      #map-wrap.map-play-view [data-map-header] {
        flex-shrink: 0;
        width: 100%;
        padding: 4px 8px 2px;
      }
      #map-wrap.map-play-view [data-map-hint] {
        display: none;
      }
      #mobile-elevator {
        flex-shrink: 0;
        padding: 6px 8px;
        border-bottom: 1px solid #30363d;
        background: #0d1117;
      }
      #mobile-elevator[hidden] {
        display: none !important;
      }
      #mobile-elevator .elevator-expand {
        width: 100%;
        min-height: 36px;
        margin: 0;
        color: #39c5cf;
        border-color: #39c5cf66;
      }
      #mobile-elevator .elevator-label {
        color: #39c5cf;
        font-size: 0.7rem;
        text-align: center;
        width: 100%;
        margin-bottom: 4px;
      }
      #mobile-elevator .elevator-grid {
        display: flex;
        flex-direction: column;
        gap: 6px;
        width: 100%;
      }
      #mobile-elevator .elevator-row {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 6px;
        width: 100%;
      }
      #mobile-elevator .elevator-btn {
        min-height: 44px;
        margin: 0;
        padding: 0;
        font-size: 1rem;
        font-weight: bold;
        width: 100%;
      }
      #mobile-elevator .elevator-btn.current {
        border-color: #39c5cf;
        color: #39c5cf;
        background: #161b22;
      }
      #mobile-elevator .elevator-btn.disabled {
        opacity: 0.45;
      }
      #mobile-dpad {
        flex-shrink: 0;
        display: flex;
        justify-content: center;
        padding: 6px 12px 4px;
        border-top: 1px solid #21262d;
      }
      #mobile-dpad[hidden] {
        display: none !important;
      }
      #mobile-dpad .dpad {
        display: grid;
        grid-template-columns: repeat(3, 52px);
        gap: 6px;
        width: max-content;
      }
      #mobile-dpad .dpad-btn {
        min-height: 52px;
        min-width: 52px;
        font-size: 1.45rem;
        margin: 0;
        padding: 0;
      }
      #mobile-dpad .dpad span {
        width: 52px;
        height: 52px;
      }
      #map-wrap.map-text-view {
        align-items: stretch;
        justify-content: flex-start;
        padding: 0;
      }
      #map-wrap.map-text-view #map {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      #map-wrap.map-text-view #map .map-scroll {
        flex: 1;
        min-height: 0;
      }
      #map {
        border: none;
        border-radius: 0;
        padding: 0;
        margin: 0;
        background: transparent;
        overflow: hidden;
        max-width: 100%;
        width: 100%;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      #map .map-grid {
        font-size: inherit;
        white-space: pre;
        line-height: 1.05;
      }
      #map.encounter-view {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      #map .map-scroll {
        flex: 1;
        min-height: 0;
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        width: 100%;
        padding: 8px 10px;
        overflow-wrap: break-word;
        word-break: break-word;
        line-height: 1.45;
      }
      html.mobile-layout.mobile-text-choices #map .map-scroll {
        padding: 10px 12px calc(16px + env(safe-area-inset-bottom));
      }
      #map .map-scroll .touch-choice {
        display: block;
        margin: 6px 0;
        padding: 12px 10px;
        border: 1px solid #30363d;
        border-radius: 8px;
        background: #161b22;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      #map .map-scroll .touch-choice:active {
        background: #21262d;
      }
      #map .map-scroll .touch-choice.touch-continue {
        margin-top: 16px;
        text-align: center;
        color: #39c5cf;
        font-weight: bold;
      }
      #map .map-scroll .touch-choice.muted {
        color: #8b949e;
      }
      #map .map-scroll .greeting,
      #map .map-scroll .choice,
      #map .map-scroll .side-opt,
      #map .map-scroll .entity,
      #map .map-scroll .teaching,
      #map .map-scroll .banter-line {
        overflow-wrap: break-word;
        word-break: break-word;
      }
      #hint { display: none !important; }
      #panel { display: none !important; }
      #toolbar {
        margin: 0;
        border-top: 1px solid #30363d;
        background: #0d1117;
        padding: 6px 8px calc(6px + env(safe-area-inset-bottom));
        align-content: end;
        min-height: 0;
      }
      html.mobile-layout.mobile-text-choices #toolbar,
      html.mobile-layout.mobile-toolbar-hidden #toolbar {
        display: none !important;
      }
      #toolbar.toolbar-mobile {
        display: flex;
        flex-direction: column;
        gap: 6px;
        justify-content: flex-end;
        overflow: hidden;
        min-height: 0;
      }
      #toolbar .action-row {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
        min-width: 0;
        width: 100%;
      }
      #toolbar .action-row button {
        min-height: 42px;
        margin: 0;
        padding: 4px 2px;
        font-size: 0.7rem;
        line-height: 1.15;
      }
      #toolbar.toolbar-stack {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      #toolbar.toolbar-stack button {
        min-height: 44px;
        margin: 0;
        font-size: 0.85rem;
      }
      .mobile-hide { display: none !important; }
      #debug-json-toggle { display: none !important; }
    }

    /* Kun JS asettaa mobile-layout-luokan (@media ei osu DevToolsissa) */
    html.mobile-layout body { padding: 0; overflow: hidden; }
    html.mobile-layout #app {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) minmax(150px, 26dvh);
      height: 100dvh;
      max-height: 100dvh;
      max-width: none;
      margin: 0;
    }
    html.mobile-layout #hud-stats { display: flex; padding: 4px 10px 6px; }
    html.mobile-layout #message-bar { display: block; padding: 4px 10px; border-bottom: 1px solid #30363d; margin: 0; font-size: 12px; }
    html.mobile-layout .row { display: contents; }
    html.mobile-layout #main { min-width: 0; max-width: none; display: flex; flex-direction: column; overflow: hidden; padding: 0; min-height: 0; }
    html.mobile-layout #panel { display: none !important; }
    html.mobile-layout #hint { display: none !important; }
    html.mobile-layout #mobile-dpad:not([hidden]) { display: flex; }

    @media (min-width: 769px) {
      html:not(.mobile-layout) body {
        padding: 12px 16px 20px;
      }
      html:not(.mobile-layout) #app {
        max-width: 960px;
        margin: 0 auto;
      }
      html:not(.mobile-layout) #hud-stats {
        display: flex;
        justify-content: center;
      }
      html:not(.mobile-layout) #message-bar {
        display: block;
        text-align: center;
        margin-bottom: 10px;
      }
      html:not(.mobile-layout) #toolbar.toolbar-desktop .elevator-panel {
        width: 100%;
        margin-top: 8px;
      }
      html:not(.mobile-layout) #toolbar .elevator-expand {
        width: 100%;
        color: #39c5cf;
        border-color: #39c5cf66;
      }
      html:not(.mobile-layout) #toolbar .elevator-label {
        color: #39c5cf;
        font-size: 12px;
        width: 100%;
        margin-bottom: 6px;
      }
      html:not(.mobile-layout) #toolbar .elevator-grid {
        display: flex;
        flex-direction: column;
        gap: 4px;
        width: 100%;
      }
      html:not(.mobile-layout) #toolbar .elevator-row {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 4px;
        width: 100%;
        max-width: 320px;
      }
      html:not(.mobile-layout) #toolbar .elevator-btn {
        min-height: 36px;
        font-weight: bold;
      }
      html:not(.mobile-layout) #toolbar .elevator-btn.current {
        background: #238636;
        border-color: #3fb950;
      }
      html:not(.mobile-layout) #toolbar .elevator-btn.disabled {
        opacity: 0.35;
      }
      #top-bar {
        text-align: center;
        margin-bottom: 4px;
      }
      #game-area {
        flex-direction: column;
        align-items: center;
      }
      #main {
        flex: none;
        width: 100%;
        max-width: 820px;
        min-width: 0;
      }
      #map-wrap.map-text-view {
        justify-content: flex-start;
        align-items: stretch;
        max-height: calc(100vh - 220px);
        overflow: hidden;
      }
      #map-wrap.map-text-view #map {
        width: 100%;
        max-width: 780px;
        margin: 0 auto;
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      #map-wrap.map-text-view #map .map-scroll {
        width: 100%;
        padding: 8px 16px;
        box-sizing: border-box;
      }
      #map-wrap {
        max-height: calc(100vh - 220px);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      #map {
        width: 100%;
        max-width: 780px;
        margin: 0 auto;
        padding: 16px 20px;
      }
      #map .map-grid,
      #map [data-map-grid] {
        font-size: 15px;
        line-height: 1.12;
      }
      #map [data-map-rows] {
        margin: 0 auto;
      }
      #hint {
        text-align: center;
        max-width: 780px;
        margin: 10px auto 0;
      }
      #debug-json-toggle {
        display: block !important;
      }
      body.show-debug-json #debug-json-toggle {
        display: none !important;
      }
      #panel.debug-panel {
        display: none;
        width: 100%;
        max-width: 820px;
        margin: 16px auto 0;
      }
      body.show-debug-json #panel.debug-panel {
        display: block;
      }
      #status {
        display: none;
      }
      #map.encounter-view {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        max-height: calc(100vh - 180px);
      }
      #map .map-scroll {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding-right: 4px;
      }
      #map [data-map-shell] {
        display: flex;
        flex-direction: column;
        min-height: 0;
        max-height: calc(100vh - 180px);
      }
      #map [data-map-grid] {
        flex: 1;
        min-height: 0;
        overflow: auto;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <header id="top-bar">
      <h1>Koodisampo</h1>
      <div id="hud-stats"></div>
    </header>
    <div id="message-bar" hidden></div>
    <div class="row">
      <div id="game-area">
        <div id="main">
          <div id="map-wrap">
            <div id="map">ladataan…</div>
          </div>
          <div id="mobile-elevator" hidden></div>
          <div id="mobile-dpad" hidden></div>
          <div class="hint" id="hint"></div>
          <button type="button" id="debug-json-toggle" class="muted" style="display:block;margin:8px auto 0;font-size:11px;padding:4px 10px">Näytä JSON</button>
        </div>
        <aside id="panel" class="debug-panel">
          <div style="color:#8b949e;font-size:11px;margin-bottom:8px">Debug snapshot (` näppäin tai ?debug=1)</div>
          <div id="meta"></div>
          <div id="status" class="status"></div>
          <pre id="json"></pre>
        </aside>
      </div>
    </div>
    <footer id="toolbar" class="toolbar"></footer>
  </div>
  <div id="profile-setup" class="profile-setup" hidden>
    <form id="profile-setup-form" class="profile-setup-card">
      <h2>Tervetuloa Koodisampoon</h2>
      <p class="profile-setup-lead">Kerro kuka olet — kollegat tervehtivät sinua nimelläsi.</p>
      <label class="profile-setup-field">
        <span>Nimesi</span>
        <input id="profile-name" name="name" type="text" maxlength="24" autocomplete="nickname" placeholder="esim. Pekka" required />
      </label>
      <label class="profile-setup-field">
        <span>Erikoisosaaminen</span>
        <select id="profile-specialty" name="specialty" required></select>
      </label>
      <p class="profile-setup-hint">Kysymykset painottuvat valitsemaasi osaamiseen.</p>
      <p id="profile-setup-error" class="profile-setup-error" hidden></p>
      <button type="button" id="profile-start-btn" class="profile-setup-submit">Aloita peli</button>
    </form>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
