# Build web app and publish to GitHub Pages (gh-pages branch).
#
# Required GitLab CI/CD variables (Settings → CI/CD → Variables):
#   GITHUB_TOKEN       — fine-grained or classic PAT with contents:write on the Pages repo
#   GITHUB_PAGES_REPO  — e.g. terotolonen/koodisampo
#
# Optional:
#   PAGES_BASE         — Vite base path (default /koodisampo/ for project pages)

stages:
  - build
  - deploy

variables:
  NODE_VERSION: "22"
  PAGES_BASE: "/koodisampo/"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

build:web:
  stage: build
  image: node:${NODE_VERSION}-bookworm
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - web/dist/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy:github-pages:
  stage: deploy
  image: node:${NODE_VERSION}-bookworm
  needs:
    - job: build:web
      artifacts: true
  script:
    - apt-get update -qq && apt-get install -y -qq git
    - cp web/dist/index.html web/dist/404.html
    - |
      cd web/dist
      git init -b gh-pages
      git config user.email "ci@gitlab"
      git config user.name "GitLab CI"
      git add -A
      git commit -m "Deploy ${CI_COMMIT_SHORT_SHA} from GitLab CI"
      git push -f "https://oauth2:${GITHUB_TOKEN}@github.com/${GITHUB_PAGES_REPO}.git" HEAD:gh-pages
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
